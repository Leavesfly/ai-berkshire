# AI Berkshire CI — 代码质量守护
# 触发：push / PR 到 main 分支
# 检查：ruff lint + pytest 冒烟测试

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov

      - name: Ruff lint
        run: ruff check tools/*.py tools/core/*.py tests/

      - name: Ruff format check
        run: ruff format --check tools/*.py tools/core/*.py tests/

      - name: Registry consistency check
        run: python tools/skill_registry.py --check

      - name: Run smoke tests
        run: python -m pytest tests/ -q --tb=short --cov=tools/core --cov-report=term-missing
